<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>高一智 課程影音介面</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f0f2f5;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
        }
    </style>
</head>

<body>

    <h1>高一智 課程影音介面</h1>
    <p><span style="color: red;">公告：</span>第九週影音尚未處理完畢，敬請稍後</p>
    <p><span style="color: red;">注意事項：</span><br>
        閱覽影音需登入學校go帳號並且有在高一智學習歷程檔案協作者之中。<br>
        若影音已處理完畢，將會亮起綠色指示。
    </p>

    <div class="controls">
        <select id="scheduleSelector" onchange="document.getElementById('contentFrame').src = this.value;">
            <option value="">選擇周次</option>
            <option value="09.htm">9</option>
            <option value="10.htm">10</option>

        </select>
    </div>

    <iframe id="contentFrame" src="" name="contentFrame"></iframe>

    <p style="text-align: center;">&copy;系統由許元洧維護 若有問題請通報</p>
</body>

</html>
